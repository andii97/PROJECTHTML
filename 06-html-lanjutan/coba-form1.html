<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Elemen Form</title>
  </head>
  <body>
    <h1>Contoh elemen-elemen form pada HTML</h1>

    <form>
      <label for="nama"
        >Nama Lengkap:
        <input
          type="text"
          name="nama"
          id="nama"
          placeholder="Masukkan nama lengkap"
        />
      </label>

      <br />

      <label for="password"
        >Password:
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Masukkan password"
        />
      </label>

      <br />

      <label for="email"
        >Email:
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Masukkan alamat email"
        />
      </label>

      <br />

      <label for="number"
        >Angka:
        <input
          type="number"
          name="number"
          id="number"
          placeholder="Masukkan angka"
        />
      </label>

      <br>

      <label for="date"
        >Tanggal:
        <input
          type="date"
          name="date"
          id="date"
          placeholder="Masukkan tanggal"
        />

        <br>

        <label for="color"
          >Pilih Warna:
          <input
            type="color"
            name="color"
            id="color"
            placeholder="Pilih warna favorit"
          />

      <br />

      <button type="submit">Submit!</button>
    </form>
  </body>
</html>
