<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Elemen Form</title>
  </head>
  <body>
    <h1>Contoh elemen-elemen form pada HTML</h1>

    <form>
      <table>
        <tr>
          <td>
            <label for="nama">Nama Lengkap:</label>
          </td>
          <td>
            <input
              type="text"
              name="nama"
              id="nama"
              placeholder="Masukkan nama lengkap"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="password">Password:</label>
          </td>
          <td>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Masukkan password"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="email">Email:</label>
          </td>
          <td>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Masukkan alamat email"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="number">Angka:</label>
          </td>
          <td>
            <input
              type="number"
              name="number"
              id="number"
              placeholder="Masukkan angka"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="date">Tanggal: </label>
          </td>
          <td>
            <input
              type="date"
              name="date"
              id="date"
              placeholder="Masukkan tanggal"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="color">Pilih Warna:</label>
          </td>
          <td>
            <input
              type="color"
              name="color"
              id="color"
              placeholder="Pilih warna favorit"
            />
          </td>
        </tr>
        <tr>
          <td></td>
          <td colspan="2">
            <button type="submit">Submit!</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
